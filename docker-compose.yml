version: '3.9'

services:
  web:
    build:
      context: .
      # BuildKit은 환경변수로 활성화: DOCKER_BUILDKIT=1 docker-compose build
      # 또는 .env 파일에 DOCKER_BUILDKIT=1 추가
    # 이미지 버전은 package.json의 version을 자동으로 사용합니다 (docker:build 스크립트 참조)
    image: modol:${APP_VERSION:-0.1.0}
    container_name: modol
    ports:
      - '${EXTERNAL_PORT:-3100}:3000'
    env_file:
      - ./docker.env
    # 컨테이너에서 호스트의 localhost 접근 방법:
    # 1. host.docker.internal 사용 (권장) - macOS, Windows, Linux 모두 지원
    # 2. network_mode: "host" 사용 - Linux에서만 작동, 보안상 권장하지 않음
    # 3. 호스트 IP 직접 사용 (예: 172.17.0.1) - 플랫폼별로 다를 수 있음
    extra_hosts:
      - 'host.docker.internal:host-gateway' # 호스트 머신의 localhost에 접근 가능
      - 'bora.local:host-gateway' # bora.local을 호스트 게이트웨이로 매핑
      - 'spark-bora.local:host-gateway' # spark.local을 호스트 게이트웨이로 매핑
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - TZ=Asia/Seoul
      # POSTGRES_URI는 docker.env 파일에서 읽어옵니다
      # Ollama 서비스 접근 (Docker Compose 내부 네트워크 사용)
      # 컨테이너 간 통신이므로 서비스 이름(ollama)으로 접근
      # 다른 호스트 서비스 접근 예시:
      # - EXTERNAL_API_URL=http://host.docker.internal:8080
      # - REDIS_URL=redis://host.docker.internal:6379
    # PostgreSQL이 준비될 때까지 대기 (healthcheck 통과 후 web 서비스 시작)
    # DB 스키마 초기화는 docker.env의 AUTO_INIT_DB 설정에 따라 결정됩니다. (기본값: true)
    # 컨테이너 시작 시 테이블이 없으면 자동으로 생성됩니다. 테이블이 이미 존재하면 건너뜁니다.
    # 자동 초기화를 비활성화하려면 docker.env에서 AUTO_INIT_DB=false로 설정하세요.
    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      # 업로드 및 문서 데이터는 호스트에 영속화 (volumes 폴더 하위로 이동)
      - ./volumes:/app/volumes
      # 스키마 생성 스크립트를 볼륨으로 마운트 (수동 초기화 시 사용)
      - ./scripts:/app/scripts:ro
      # entrypoint 스크립트를 볼륨으로 마운트 (환경 검증 → DB 초기화(선택적) → 서버 시작)
      - ./docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
    restart: unless-stopped

  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: modol
      TZ: Asia/Seoul
    volumes:
      # PostgreSQL 데이터를 호스트에 영속화 (컨테이너 삭제 후에도 데이터 유지)
      - ./volumes/postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    # PostgreSQL healthcheck: web 서비스가 시작되기 전에 PostgreSQL이 준비되었는지 확인
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
